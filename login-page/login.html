<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Sign In / Sign Up</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

  <link rel="stylesheet" href="login.css">
</head>

<body>

  <div class="auth-container">

    <div class="auth-box">

      <div class="tab-toggle">
        <button id="signInBtn" class="active">Sign In</button>
        <button id="signUpBtn">Sign Up</button>
      </div>

      <!-- SIGN IN -->
      <div id="signInForm" class="form active">

        <input type="email" id="signinEmail" placeholder="Email Address" required>

        <div class="password-box">
          <input type="password" id="signinPassword" placeholder="Password" required>
          <span class="toggle" onclick="togglePassword('signinPassword')">
            <i class="fa-solid fa-eye"></i>
          </span>
        </div>

       

        <button id="loginBtn">Sign In</button>

      </div>


      <!-- SIGN UP -->
      <div id="signUpForm" class="form">
        <input type="text" id="signupName" placeholder="Full Name" required>
        <input type="email" id="signupEmail" placeholder="Email Address" required>
        <div class="password-box">
          <input type="password" id="signupPassword" placeholder="Password" required>
          <span class="toggle" onclick="togglePassword('signupPassword')">
            <i class="fa-solid fa-eye"></i>
          </span>
        </div>
        <button id="registerBtn">Sign Up</button>
      </div>
    </div>
  </div>

  <script type="module" src="login-auth.js"></script>
  <script src="login.js"></script>

</body>

</html>
