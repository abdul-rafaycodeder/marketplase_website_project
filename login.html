<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign In / Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="auth-container">

  <div class="auth-box">

    <div class="tab-toggle">
      <button id="signInBtn" class="active">Sign In</button>
      <button id="signUpBtn">Sign Up</button>
    </div>

    <!-- Sign In Form -->
    <form id="signInForm">
      <input type="email" id="signinEmail" placeholder="Email Address" required>
      <div class="password-box">
        <input type="password" id="signinPassword" placeholder="Password" required>
        <span class="toggle" onclick="togglePassword('signinPassword')">👁</span>
      </div>
      <div class="options">
        <label><input type="checkbox"> Remember me</label>
        <a href="#">Forgot password?</a>
      </div>
      <button type="submit">Sign In</button>
    </form>

    <!-- Sign Up Form -->
    <form id="signUpForm">
      <input type="text" id="signupName" placeholder="Full Name" required>
      <input type="email" id="signupEmail" placeholder="Email Address" required>
      <div class="password-box">
        <input type="password" id="signupPassword" placeholder="Password" required>
        <span class="toggle" onclick="togglePassword('signupPassword')">👁</span>
      </div>
      <button type="submit">Sign Up</button>
    </form>

  </div>

</div>
    <script src="login.js"></script>
    <script type="module" src="login-auth.js"></script>
</body>

</html>
